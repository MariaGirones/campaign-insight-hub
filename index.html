<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dedupe &mdash; Duplicate Record Finder</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-name">dedupe</span>
        <span class="brand-sep"></span>
        <span class="brand-tag">Duplicate Record Finder</span>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Step 1: Upload -->
    <section id="upload-section" class="card">
      <div id="drop-zone" class="drop-zone">
        <div class="drop-inner">
          <svg class="drop-icon" width="32" height="32" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-title">Drop your file here</p>
          <p class="drop-hint">CSV or PDF &mdash; <label class="link" for="file-input">browse</label></p>
          <input type="file" id="file-input" accept=".csv,.pdf" hidden>
        </div>
      </div>
      <div id="upload-status" class="upload-status hidden"></div>
    </section>

    <!-- Step 2: Column Selector -->
    <section id="columns-section" class="card hidden">
      <div class="card-header">
        <h2 class="card-title">Select columns to scan</h2>
        <p class="card-sub">Auto-detected fields are pre-selected. Toggle any column to include or exclude it.</p>
      </div>
      <div id="column-list" class="column-list"></div>
      <div class="row-actions">
        <button id="find-btn" class="btn btn-primary">Find Duplicates</button>
        <button id="reset-btn" class="btn btn-ghost">Start over</button>
      </div>
    </section>

    <!-- Step 3: Results -->
    <section id="results-section" class="hidden">
      <div id="results-summary"></div>
      <div id="results-detail"></div>
      <div id="results-table-wrap"></div>
    </section>

  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
